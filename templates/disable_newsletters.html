{% extends "base.html" %}
{% block title %}Disable Newsletters for Your Blog{% endblock %}
{% block content %}
<h1 class="text-center">Disable Newsletters for Your Blog</h1>
<p class="text-muted text-center">Enter your email address to disable newsletters for your blog. A confirmation email will be sent.</p>

<form method="POST" action="{{ url_for('disable_newsletters') }}" class="mt-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>
    <button type="submit" class="btn btn-danger">Disable Newsletters</button>
</form>
{% endblock %}
