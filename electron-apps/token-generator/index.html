<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Token Generator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button, textarea { width: 100%; margin-bottom: 10px; }
    label { font-weight: bold; }
    #countdownTimer { font-size: 1.2em; color: green; }
  </style>
</head>
<body>
  <h2>Token Generator App</h2>

  <label for="tokenSecret">TOKEN_SECRET:</label>
  <input type="text" id="tokenSecret" placeholder="Enter TOKEN_SECRET">

  <label for="bucketName">Bucket Name:</label>
  <input type="text" id="bucketName" placeholder="Enter Bucket Name">

  <label for="validMinutes">Valid Minutes:</label>
  <input type="number" id="validMinutes" placeholder="Enter Valid Minutes" min="1">

  <button onclick="generateToken()">Generate Token</button>

  <label for="generatedToken">Generated Token:</label>
  <textarea id="generatedToken" rows="3" readonly></textarea>

  <h3>Token Expires In:</h3>
  <p id="countdownTimer">--:--:--</p>

  <script src="renderer.js"></script>
</body>
</html>
